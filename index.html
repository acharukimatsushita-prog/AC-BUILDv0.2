<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AC-BUILDE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="react-root"></div>
  <noscript>
    <div style="padding:16px;font-family:Meiryo,sans-serif;background:#fff3cd;color:#5f4300;">
      JavaScriptが無効です。ブラウザ設定でJavaScriptを有効にしてください。
    </div>
  </noscript>

  <div class="app-shell">
    <header class="topbar">
      <button class="icon-button" id="backButton" type="button" aria-label="戻る" title="戻る">
        <span aria-hidden="true">‹</span>
      </button>
      <div>
        <p class="eyebrow">Assembly Standard Viewer</p>
        <h1>AC-BUILDE</h1>
        <p class="version-label">試作版 v0.1 / Google Drive運用モデル</p>
      </div>
      <button class="icon-button" id="fullscreenButton" type="button" aria-label="全画面" title="全画面">
        <span aria-hidden="true">⛶</span>
      </button>
    </header>

    <main>
      <section class="view is-active" id="deviceView" aria-labelledby="deviceTitle">
        <div class="toolbar">
          <div>
            <h2 id="deviceTitle">装置選択</h2>
            <p>Google Driveで管理している組立標準を選択します。</p>
          </div>
          <div class="toolbar-actions">
            <button id="exportDevicesButton" type="button">書き出し</button>
            <button id="importDevicesButton" type="button">読み込み</button>
            <button id="openDriveButton" type="button">Drive同期</button>
            <button id="manageModeButton" type="button" aria-pressed="false">Manage</button>
          </div>
        </div>
        <input id="importDevicesInput" type="file" accept=".json,application/json" hidden>

        <label class="search-box">
          <span>検索</span>
          <input id="searchInput" type="search" placeholder="装置名で検索">
        </label>

        <div class="device-grid" id="deviceGrid"></div>
      </section>

      <section class="view" id="driveView" aria-labelledby="driveTitle">
        <div class="toolbar">
          <div>
            <h2 id="driveTitle">Google Drive同期</h2>
            <p>大分類フォルダから装置PDFを読み込み、分割候補を作成します。</p>
          </div>
          <button class="primary-button" id="syncDriveButton" type="button">同期</button>
        </div>

        <div class="drive-import">
          <label class="drive-url-box">
            <span>DriveフォルダURL</span>
            <input id="driveFolderInput" type="url">
          </label>
          <div class="drive-status" id="driveStatus">未同期</div>
        </div>

        <div class="drive-layout">
          <aside class="drive-sidebar">
            <h3>大分類</h3>
            <div id="categoryList" class="category-list"></div>
          </aside>

          <section class="drive-files">
            <h3>装置PDF</h3>
            <div id="pdfList" class="pdf-list"></div>
          </section>

          <section class="drive-preview">
            <div class="preview-head">
              <div>
                <h3>分割後プレビュー</h3>
                <p id="previewDeviceName">PDFを選択してください。</p>
              </div>
              <div class="preview-actions">
                <label class="compact-select">
                  <span>分割</span>
                  <select id="splitModeSelect">
                    <option value="normal">標準</option>
                    <option value="fine">細かく</option>
                    <option value="extra">かなり細かく</option>
                  </select>
                </label>
                <label class="compact-select">
                  <span>まとめ</span>
                  <select id="mergeModeSelect">
                    <option value="weak">弱</option>
                    <option value="normal" selected>標準</option>
                    <option value="strong">強</option>
                  </select>
                </label>
                <button id="openPdfButton" type="button">PDF確認</button>
                <button class="primary-button" id="autoSplitButton" type="button">自動分割</button>
                <button id="registerPreviewButton" type="button">装置一覧へ追加</button>
              </div>
            </div>
            <div class="setup-note preview-notice" id="previewNotice">
              <strong>タイトルは手動編集できます</strong>
              <span>自動分割後、各カードの入力欄で工程タイトルを編集してください。</span>
            </div>
            <div id="splitPreviewGrid" class="split-preview-grid"></div>
          </section>
        </div>
      </section>

      <section class="view" id="slideView" aria-labelledby="slideDeviceName">
        <div class="slide-head">
          <div>
            <p class="eyebrow" id="slideSource"></p>
            <h2 id="slideDeviceName"></h2>
          </div>
          <div class="step-counter" id="stepCounter"></div>
        </div>

        <div class="slide-stage">
          <button class="nav-hit nav-prev" id="prevButton" type="button" aria-label="前の工程">‹</button>
          <figure class="step-card">
            <img id="stepImage" alt="">
            <figcaption>
              <strong id="stepTitle"></strong>
              <span id="stepMemo"></span>
            </figcaption>
          </figure>
          <button class="nav-hit nav-next" id="nextButton" type="button" aria-label="次の工程">›</button>
        </div>

        <div class="bottom-controls">
          <button id="prevControl" type="button">前へ</button>
          <input id="stepSlider" type="range" min="0" max="0" value="0">
          <button id="nextControl" type="button">次へ</button>
        </div>
        <div class="step-edit-panel">
          <label>
            <span>工程タイトル</span>
            <input id="slideTitleInput" type="text">
          </label>
          <button id="saveSlideTitleButton" type="button">タイトル保存</button>
        </div>
      </section>

    </main>
  </div>

  <div class="preview-modal" id="previewModal" aria-hidden="true">
    <div class="preview-modal-backdrop" id="previewModalBackdrop"></div>
    <div class="preview-modal-body" role="dialog" aria-modal="true" aria-labelledby="modalStepTitle">
      <header class="preview-modal-head">
        <div>
          <p class="eyebrow" id="modalStepMemo"></p>
          <h2 id="modalStepTitle">分割プレビュー</h2>
        </div>
        <button class="icon-button" id="closePreviewModal" type="button" aria-label="閉じる" title="閉じる">×</button>
      </header>
      <img id="modalStepImage" alt="">
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script type="module" src="/src/main.tsx"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
