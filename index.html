<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AC-BUILD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-badge" aria-hidden="true">AC</div>
      <div>
        <p class="eyebrow">Assembly Standard Viewer</p>
        <h1>AC-BUILD</h1>
      </div>
      <div class="topbar-controls">
        <button class="icon-button" id="backButton" type="button" aria-label="戻る" title="戻る">
          <span aria-hidden="true">‹</span>
        </button>
        <button class="icon-button" id="fullscreenButton" type="button" aria-label="全画面" title="全画面">
          <span aria-hidden="true">⛶</span>
        </button>
      </div>
    </header>
  <div id="react-root"></div>
  <noscript>
    <div style="padding:16px;font-family:Meiryo,sans-serif;background:#fff3cd;color:#5f4300;">
      JavaScriptが無効です。ブラウザ設定でJavaScriptを有効にしてください。
    </div>
  </noscript>

    <main>


      <section class="view" id="slideView" aria-labelledby="slideDeviceName">
        <div class="slide-head">
          <div>
            <p class="eyebrow" id="slideSource"></p>
            <h2 id="slideDeviceName"></h2>
          </div>
          <div class="step-counter" id="stepCounter"></div>
        </div>

        <div class="slide-stage">
          <button class="nav-hit nav-prev" id="prevButton" type="button" aria-label="前の工程">‹</button>
          <figure class="step-card">
            <img id="stepImage" alt="">
            <figcaption>
              <strong id="stepTitle"></strong>
              <span id="stepMemo"></span>
            </figcaption>
          </figure>
          <button class="nav-hit nav-next" id="nextButton" type="button" aria-label="次の工程">›</button>
        </div>

        <div class="bottom-controls">
          <button id="prevControl" type="button">前へ</button>
          <input id="stepSlider" type="range" min="0" max="0" value="0">
          <button id="nextControl" type="button">次へ</button>
        </div>
        <div class="step-edit-panel">
          <label>
            <span>工程タイトル</span>
            <input id="slideTitleInput" type="text">
          </label>
          <button id="saveSlideTitleButton" type="button">タイトル保存</button>
        </div>
      </section>
    </main>
  </div>

  <div class="preview-modal" id="previewModal" aria-hidden="true">
    <div class="preview-modal-backdrop" id="previewModalBackdrop"></div>
    <div class="preview-modal-body" role="dialog" aria-modal="true" aria-labelledby="modalStepTitle">
      <header class="preview-modal-head">
        <div>
          <p class="eyebrow" id="modalStepMemo"></p>
          <h2 id="modalStepTitle">分割プレビュー</h2>
        </div>
        <button class="icon-button" id="closePreviewModal" type="button" aria-label="閉じる" title="閉じる">×</button>
      </header>
      <img id="modalStepImage" alt="">
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
