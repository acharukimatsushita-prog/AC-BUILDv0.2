# Legacy AC-BUILDE (Vite + Node API)
services:
  web:
    build: .
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_PROXY_TARGET: http://api:8099
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api

  api:
    build: .
    command: npm run api
    environment:
      HOST: 0.0.0.0
      PORT: 8099
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      DATABASE_URL: postgres://postgres:postgres@db:5432/ac_builde
    ports:
      - "8099:8099"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ac_builde
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ac_builde"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
